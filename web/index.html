<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f2f2f2;
}

form {
  width: 320px;
  margin: 40px auto;
  padding: 40px;
  background-color: white;
  border: 1px solid #ccc;
}

h2 {
  text-align: center;
  color: #333;
}

label {
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 7px;
  margin-top: 5px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 8px;
  background-color: #4CAF50;
  color: white;
  border: none;
}

button:hover {
  background-color: #45a049;
}
</style>

</head>
<body>

<form>
  <h2>Registration Form</h2>

  <label>First Name</label>
  <input type="text">

  <label>Last Name</label>
  <input type="text">

  <label>Email</label>
  <input type="email">

  <label>Password</label>
  <input type="password">

  <label>Gender</label>
  <select>
    <option>Male</option>
    <option>Female</option>
  </select>

  <button type="submit">Register</button>
</form>

</body>
</html>
