<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TurfKick | Book Your Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/glass.css">

</head>
<body>

<header class="hero">
  <nav class="navbar">
    <div class="logo">TurfKick</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Turfs</a></li>
      <li><a href="#">Login</a></li>
      <li><a href="#" class="btn">Register</a></li>
    </ul>
  </nav>

  <div class="hero-content">
    <h1>Book Your Turf.<br>Play Without Hassle.</h1>
    <p>Find nearby sports turfs, check availability, and book instantly.</p>

    <form class="search-box">
      <input type="text" placeholder="Enter location" required />
      <input type="date" required />
      <select>
        <option value="">Select Sport</option>
        <option>Football</option>
        <option>Cricket</option>
        <option>Badminton</option>
      </select>
      <button type="submit">Search</button>
    </form>
  </div>
</header>

</body>
</html>
